inherits = "boo_berry"

# --- Syntax (Hazy-leaning but calm) ---
keyword = { fg = "text", modifiers = ["bold"] }
"keyword.directive" = { fg = "text", modifiers = ["bold"] }

function = "primary"
"function.builtin" = "primary"
tag = "primary"
special = "primary"
"variable.builtin" = "primary"
"type.builtin" = "primary"
"constant.character.escape" = "primary"

string = "second"
"variable.other.member" = "third"
constructor = "fourth"

comment = { fg = "comment", modifiers = ["italic"] }

# --- UI comfort ---
"ui.linenr" = { fg = "frame" }
"ui.virtual.indent-guide" = { fg = "panel" }
"ui.virtual.whitespace" = { fg = "#272427" }
# "ui.virtual.whitespace" = { fg = "#3D3547" }
"ui.cursorline.primary" = { bg = "berry_saturated" }

"ui.selection" = { bg = "selection" }
"ui.selection.primary" = { bg = "selection" }

# --- Diagnostics (less aggressive) ---
"diagnostic.hint" = { underline = { color = "comment", style = "line" } }
"diagnostic.info" = { underline = { color = "blue", style = "line" } }
"diagnostic.warning" = { underline = { color = "yellow", style = "curl" } }
"diagnostic.error" = { underline = { color = "red", style = "curl" } }

# --- Diffs ---
"diff.plus" = "green"
"diff.minus" = "red"
"diff.delta" = "yellow"

warning = "yellow"
error = "red"
info = "blue"
hint = "comment"

[palette]
berry = "#17131B"
berry_saturated = "#221D28"
background = "#17131B"
panel = "#221D28"

selection = "#1A2E4D"

text = "#eee4ff"
text2 = "#cbbcd3"
comment = "#6B5A77"
frame = "#5E536B"

primary = "#ff8fc4"
second  = "#f9bbff"
third   = "#b4b7f2"
fourth  = "#96ccff"
fifth   = "#b2ffe3"

green = "#8cfba2"
yellow = "#fbe88c"
red = "#fb9b8c"
blue = "#8cc9fb"
