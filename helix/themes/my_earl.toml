# Author : Steven Vancoillie <steven.vancoillie@gmail.com>
#
# Earl Grey (high-contrast restrained variant)
# Minimal palette, stronger separation for Go/TS/Rust/Svelte.

# --- Core syntax ---
"comment" = { fg = "darkgrey", modifiers = ["italic"] }

"keyword" = { fg = "earl", modifiers = ["bold"] }
"keyword.control" = { fg = "earl", modifiers = ["bold"] }
"keyword.directive" = { fg = "earl", modifiers = ["bold"] }

"type" = { fg = "maple", modifiers = ["bold"] }
"type.builtin" = { fg = "maple", modifiers = ["bold"] }
"type.enum.variant" = { fg = "maple", modifiers = ["bold"] }

"function" = { fg = "sky", modifiers = ["bold"] }
"function.method" = { fg = "sky", modifiers = ["bold"] }
"function.builtin" = { fg = "sky", modifiers = ["bold"] }
"function.macro" = { fg = "sky", modifiers = ["bold"] }

"variable" = "silver"
"variable.parameter" = { fg = "snow", modifiers = ["italic"] }
"variable.other.member" = "silver"

"string" = "jade"
"constant" = "maple"
"constant.numeric" = "maple"
"constant.builtin" = "earl"
"constant.character.escape" = "blush"

"operator" = "snow"
"punctuation" = "silver"
"punctuation.delimiter" = "silver"
"punctuation.bracket" = "snow"

"namespace" = { fg = "earl", modifiers = ["bold"] }
"module" = { fg = "earl", modifiers = ["bold"] }
"tag" = { fg = "earl", modifiers = ["bold"] }
"attribute" = "sky"

# --- Diagnostics / VCS ---
"diagnostic.error" = { underline = { color = "blush", style = "curl" } }
"diagnostic.warning" = { underline = { color = "maple", style = "curl" } }
"diagnostic.info" = { underline = { color = "sky", style = "curl" } }
"diagnostic.hint" = { underline = { color = "earl", style = "curl" } }

"error" = "blush"
"warning" = "maple"
"info" = "sky"
"hint" = "earl"

"diff.delta" = "silver"
"diff.minus" = "blush"
"diff.plus" = "jade"

# --- UI ---
"ui.background" = { bg = "chaotica" }
"ui.background.separator" = { fg = "snow" }

"ui.text" = { fg = "silver" }
"ui.text.focus" = { fg = "snow" }

"ui.cursor" = { fg = "black", bg = "earl" }
"ui.cursor.primary" = { fg = "black", bg = "earl" }
"ui.cursor.match" = { fg = "snow", bg = "lacquer", modifiers = ["bold"] }

"ui.cursorline.primary" = { bg = "deepspace" }
"ui.selection" = { bg = "lacquer" }
"ui.highlight" = { bg = "space" }

"ui.linenr" = { fg = "grey" }
"ui.linenr.selected" = { fg = "snow", modifiers = ["bold"] }

"ui.statusline" = { fg = "earl", bg = "deepspace" }
"ui.statusline.inactive" = { fg = "silver", bg = "deepspace", modifiers = ["dim"] }
"ui.statusline.normal" = { fg = "chaotica", bg = "sky", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "chaotica", bg = "earl", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "chaotica", bg = "maple", modifiers = ["bold"] }

"ui.menu" = { fg = "snow", bg = "deepspace" }
"ui.menu.selected" = { fg = "snow", bg = "lacquer", modifiers = ["bold"] }
"ui.menu.scroll" = { fg = "grey", bg = "deepspace" }

"ui.popup" = { bg = "deepspace" }
"ui.help" = { fg = "snow", bg = "deepspace" }

"ui.window" = { fg = "space" }
"ui.virtual" = { fg = "space" }
"ui.virtual.indent-guide" = { fg = "space" }
"ui.virtual.inlay-hint" = { fg = "grey", modifiers = ["italic"] }
"ui.virtual.jump-label" = { fg = "earl", modifiers = ["bold"] }
"ui.virtual.ruler" = { bg = "space" }

# --- Palette ---
[palette]
black = "#000000"
chaotica = "#101010"
deepspace = "#1b1b1b"
space = "#2a2a2d"
lacquer = "#3e3e3e"
darkgrey = "#505050"
grey = "#808080"
silver = "#a6a6a6"
snow = "#f0f0f0"
white = "#ffffff"
blush = "#e78284"
jade = "#90b99f"
earl = "#b59efc"
sky = "#99bbe0"
myrtle = "#e29eca"
maple = "#e5c890"
